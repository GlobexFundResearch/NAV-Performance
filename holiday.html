<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fund Holiday Caution</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f4f8; --surface: #fff; --primary: #1a3c6e; --pri-light: #2557a7;
  --accent: #dbeafe; --border: #d1dce8; --text: #1a2332; --muted: #6b7a8d;
  --header-h: 52px;
}

body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

header {
  position: sticky; top: 0; z-index: 200;
  background: linear-gradient(135deg, #0f2d5e 0%, #1a4a8a 100%);
  color: #fff; height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.h-title { font-size: 16px; font-weight: 700; }
.h-sub   { font-size: 10px; opacity: .7; margin-top: 1px; }
.back-link {
  color: #fff; text-decoration: none; font-size: 12px; font-weight: 600;
  background: rgba(255,255,255,.15); padding: 6px 12px; border-radius: 20px;
  transition: background .2s;
}
.back-link:hover { background: rgba(255,255,255,.28); }

.wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }

.section-title {
  font-size: 15px; font-weight: 700; color: var(--primary);
  margin: 24px 0 10px; display: flex; align-items: center; gap: 8px;
}
.section-title:first-child { margin-top: 0; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.fund-code { font-weight: 700; font-size: 14px; }
.fund-name { font-size: 11px; color: var(--muted); margin-top: 2px; }
.fund-class { font-size: 11px; color: var(--muted); margin-top: 1px; }
.date-pill {
  font-size: 11px; font-weight: 700; white-space: nowrap; padding: 4px 10px; border-radius: 20px;
}
.pill-today { background: #fee2e2; color: #b91c1c; }
.pill-next  { background: #fef9c3; color: #92400e; }

.empty, .loading, .err {
  text-align: center; padding: 40px 20px; color: var(--muted);
}
.err { color: #b91c1c; }

.info-box {
  background: var(--accent); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 12px; color: var(--text); margin-bottom: 18px;
}
</style>
</head>
<body>

<header>
  <div>
    <div class="h-title">📅 Fund Holiday Caution</div>
    <div class="h-sub">วันหยุดกองทุน — Internal Use Only</div>
  </div>
  <a class="back-link" href="index.html">← NAV Report</a>
</header>

<div class="wrap">
  <div class="info-box" id="info-box">กำลังโหลดข้อมูลวันหยุดกองทุน…</div>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script>
function ymd(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function utcYmd(d) {
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function nextBusinessDay(d) {
  const n = new Date(d);
  do { n.setDate(n.getDate() + 1); } while (n.getDay() === 0 || n.getDay() === 6);
  return n;
}
function normCode(code) {
  return String(code || '').replace(/\s*-\s*/g, '-').replace(/\xad/g, '-').trim().toUpperCase();
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDisplayDate(ymdStr) {
  const [y, m, d] = ymdStr.split('-').map(Number);
  return new Intl.DateTimeFormat('en-GB', { calendar: 'gregory', day: '2-digit', month: 'short', year: 'numeric' })
    .format(new Date(Date.UTC(y, m - 1, d)));
}

async function loadFundNameMap() {
  const map = {};
  try {
    const res = await fetch('nav_data.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    (data.funds || []).forEach(f => {
      const mf = f.mutual_fund || '';
      mf.split('/').forEach(tok => {
        const key = normCode(tok);
        if (key && !map[key]) map[key] = { fund_name: f.fund_name, classification: f.classification, display: tok.trim() };
      });
    });
  } catch { /* nav_data.json unavailable — fall back to fund_code only */ }
  return map;
}

async function loadHolidayFile() {
  const res = await fetch('Fundholiday.xlsx?t=' + Date.now());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { defval: null });

  const map = {}; // normCode -> Set of yyyy-mm-dd
  rows.forEach(row => {
    const code = row.fund_code ?? row['Fund Code'] ?? row['fund code'];
    const dateVal = row.holiday_date ?? row['Holiday Date'] ?? row['holiday date'];
    if (!code || !dateVal) return;
    const key = normCode(code);
    let dateStr = null;
    if (dateVal instanceof Date) dateStr = utcYmd(dateVal);
    else if (typeof dateVal === 'number') {
      const p = XLSX.SSF.parse_date_code(dateVal);
      if (p) dateStr = utcYmd(new Date(Date.UTC(p.y, p.m - 1, p.d)));
    }
    else if (typeof dateVal === 'string') { const d = new Date(dateVal); if (!isNaN(d)) dateStr = utcYmd(d); }
    if (!dateStr) return;
    if (!map[key]) map[key] = new Set();
    map[key].add(dateStr);
  });
  return map;
}

async function render() {
  const infoBox = document.getElementById('info-box');
  const content = document.getElementById('content');
  try {
    const [holidayMap, nameMap] = await Promise.all([loadHolidayFile(), loadFundNameMap()]);

    const today = new Date();
    const todayStr = ymd(today);
    const nextStr = ymd(nextBusinessDay(today));

    const todayList = [], nextList = [];
    Object.entries(holidayMap).forEach(([code, dates]) => {
      const info = nameMap[code];
      if (!info) return; // only show funds that exist in the NAV report
      if (dates.has(todayStr)) todayList.push({ code: info.display, info });
      if (dates.has(nextStr)) nextList.push({ code: info.display, info });
    });
    todayList.sort((a, b) => a.code.localeCompare(b.code));
    nextList.sort((a, b) => a.code.localeCompare(b.code));

    infoBox.textContent = `วันนี้ ${fmtDisplayDate(todayStr)} · วันทำการถัดไป ${fmtDisplayDate(nextStr)} — พบกองทุนหยุดวันนี้ ${todayList.length} กองทุน, หยุดวันทำการถัดไป ${nextList.length} กองทุน`;

    function section(title, pillClass, pillLabel, list) {
      if (!list.length) return `<div class="section-title">${title}</div><div class="empty">ไม่มีกองทุนหยุดในวันนี้</div>`;
      const cards = list.map(item => `
        <div class="card">
          <div>
            <div class="fund-code">${esc(item.code)}</div>
            ${item.info?.fund_name ? `<div class="fund-name">${esc(item.info.fund_name)}</div>` : ''}
            ${item.info?.classification ? `<div class="fund-class">${esc(item.info.classification)}</div>` : ''}
          </div>
          <span class="date-pill ${pillClass}">${pillLabel}</span>
        </div>`).join('');
      return `<div class="section-title">${title}</div>${cards}`;
    }

    content.innerHTML =
      section(`🚫 วันหยุดกองทุนวันนี้ (${fmtDisplayDate(todayStr)})`, 'pill-today', 'หยุดวันนี้', todayList) +
      section(`⚠️ วันหยุดกองทุนวันทำการถัดไป (${fmtDisplayDate(nextStr)})`, 'pill-next', 'หยุดถัดไป', nextList);

  } catch (e) {
    infoBox.textContent = '';
    content.innerHTML = `<div class="err">⚠️ Cannot load Fundholiday.xlsx<br><small>${esc(e.message)}</small><br><br>
      กรุณาอัปโหลดไฟล์ <b>Fundholiday.xlsx</b> ไว้ในโฟลเดอร์เดียวกับหน้านี้บน GitHub</div>`;
  }
}

render();
</script>
</body>
</html>
